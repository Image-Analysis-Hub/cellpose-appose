[workspace]
authors = ["Stephane Rigaud <stephane.rigaud@imba.oeaw.ac.at>"]
channels = ["conda-forge"]
name = "cellpose-appose"
platforms = ["osx-arm64", "win-64", "linux-64", "osx-64"]
version = "0.1.0"

[dependencies]
python = ">=3.10.3,<3.13"

[pypi-dependencies]
cellpose = ">=3, <4"
appose = ">=0.10.1, <0.11"

# GPU feature: CUDA on Linux/Windows, CPU fallback on macOS
[feature.gpu.target.linux-64.pypi-dependencies]
torch = { version = ">=2.2.2, <3", index = "https://download.pytorch.org/whl/cu124" }
torchvision = { version = ">=0.17.2, <0.26", index = "https://download.pytorch.org/whl/cu124" }

[feature.gpu.target.win-64.pypi-dependencies]
torch = { version = ">=2.2.2, <3", index = "https://download.pytorch.org/whl/cu124" }
torchvision = { version = ">=0.17.2, <0.26", index = "https://download.pytorch.org/whl/cu124" }

[feature.gpu.target.osx-arm64.pypi-dependencies]
torch = { version = ">=2.2.2, <3", index = "https://download.pytorch.org/whl/cpu" }
torchvision = { version = ">=0.17.2, <0.26", index = "https://download.pytorch.org/whl/cpu" }

[feature.gpu.target.osx-64.pypi-dependencies]
torch = { version = ">=2.2.2, <3", index = "https://download.pytorch.org/whl/cpu" }
torchvision = { version = ">=0.17.2, <0.26", index = "https://download.pytorch.org/whl/cpu" }

# CPU feature: CPU-only on all platforms
[feature.cpu.pypi-dependencies]
torch = { version = ">=2.2.2, <3", index = "https://download.pytorch.org/whl/cpu" }
torchvision = { version = ">=0.17.2, <0.26", index = "https://download.pytorch.org/whl/cpu" }

[environments]
gpu = { features = ["gpu"] }
default = { features = ["cpu"] }